<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign Up | Pete Zah</title>
<link rel="icon" type="image/x-icon" href="/logo.png">
<link rel="stylesheet" href="/storage/css/styles.css">
</head>
<body>
<div style="max-width:450px;margin:80px auto;padding:20px;border:1px solid #ccc;border-radius:10px; background:#f9f9f9;">
  <h2>Sign Up</h2>
  <label>Username</label><br>
  <input id="signup-name" type="text" style="width:100%;padding:8px;margin:6px 0;"><br>
  <label>Email</label><br>
  <input id="signup-email" type="email" style="width:100%;padding:8px;margin:6px 0;"><br>
  <label>Password</label><br>
  <input id="signup-password" type="password" style="width:100%;padding:8px;margin:6px 0;"><br>
  <button onclick="signUp()" style="width:100%;padding:10px;margin:10px 0;">Create Account</button>
  <p id="signup-message"></p>
  <p>Already have an account? <a href="/login.html">Login</a></p>
</div>
<script src="/storage/js/auth.js"></script>
</body>
</html>
